name: Build macOS App

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install pyinstaller pillow

      - name: Build app
        run: |
          pyinstaller --onedir --windowed \
            --icon=icon.icns \
            --add-data "custom_track.mp3:." \
            --name Classeur1 \
            automation_tool.py

      - name: Runtime test (lance l'app et capture l'ecran) - temporaire
        run: |
          open dist/Classeur1.app
          sleep 8
          screencapture -x /tmp/classeur1_test.png || echo "screencapture a echoue"
          echo "--- Processus actifs ---"
          ps aux | grep -i classeur1 | grep -v grep || echo "AUCUN PROCESSUS (crash possible)"
          echo "--- Log de l'app ---"
          cat "$HOME/Library/Application Support/Classeur1/automation_tool.log" 2>&1 || echo "pas de log trouve"
          pkill -f Classeur1 || true
        continue-on-error: true

      - name: Upload screenshot (temporaire)
        uses: actions/upload-artifact@v4
        with:
          name: classeur1-screenshot
          path: /tmp/classeur1_test.png
          if-no-files-found: warn

      - name: Package as .dmg
        run: hdiutil create -volname "Classeur1" -srcfolder dist/Classeur1.app -ov -format UDZO dist/Classeur1.dmg

      - name: Publish as GitHub Release (single-file download)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git tag -f latest
          git push -f origin latest
          gh release delete latest --yes || true
          gh release create latest dist/Classeur1.dmg \
            --title "Classeur1 (dernier build)" \
            --notes "Build automatique depuis ${{ github.sha }}" \
            --prerelease
