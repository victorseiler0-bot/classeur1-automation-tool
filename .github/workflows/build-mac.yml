name: Build macOS App

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-14
            arch: apple-silicon
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install pyinstaller pillow

      - name: Build app
        run: |
          pyinstaller --onefile --windowed \
            --icon=icon.icns \
            --add-data "custom_track.mp3:." \
            --name Classeur1 \
            automation_tool.py

      - name: Package as .dmg
        run: hdiutil create -volname "Classeur1" -srcfolder dist/Classeur1.app -ov -format UDZO "Classeur1-${{ matrix.arch }}.dmg"

      - name: Upload dmg artifact
        uses: actions/upload-artifact@v4
        with:
          name: dmg-${{ matrix.arch }}
          path: Classeur1-${{ matrix.arch }}.dmg

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          pattern: dmg-*
          merge-multiple: true

      - name: "Publish as GitHub Release (Apple Silicon)"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ls -la
          git tag -f latest
          git push -f origin latest
          gh release delete latest --yes || true
          gh release create latest Classeur1-apple-silicon.dmg \
            --title "Classeur1 (dernier build)" \
            --notes "Build automatique depuis ${{ github.sha }}. Version Apple Silicon (M1/M2/M3/M4...) uniquement pour l'instant, mode --onefile." \
            --prerelease
