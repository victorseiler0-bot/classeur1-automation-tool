name: Build macOS App

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install pyinstaller pillow

      - name: Build app
        run: |
          pyinstaller --onefile --windowed \
            --icon=icon.icns \
            --add-data "custom_track.mp3:." \
            --name Classeur1 \
            automation_tool.py

      - name: Gatekeeper diagnostic (simulate a browser download)
        run: |
          echo "--- codesign info ---"
          codesign -dv --verbose=4 dist/Classeur1.app 2>&1 || true
          echo ""
          echo "--- Applying quarantine attribute (what Safari/Chrome add on download) ---"
          xattr -w com.apple.quarantine "0081;00000000;Safari;" dist/Classeur1.app
          xattr -pl com.apple.quarantine dist/Classeur1.app || true
          echo ""
          echo "--- Gatekeeper assessment (spctl) ---"
          spctl --assess --type execute --verbose=4 dist/Classeur1.app
          echo "spctl exit code: $?"
        continue-on-error: true

      - name: Package as .dmg
        run: hdiutil create -volname "Classeur1" -srcfolder dist/Classeur1.app -ov -format UDZO dist/Classeur1.dmg

      - name: Publish as GitHub Release (single-file download)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git tag -f latest
          git push -f origin latest
          gh release delete latest --yes || true
          gh release create latest dist/Classeur1.dmg \
            --title "Classeur1 (dernier build)" \
            --notes "Build automatique depuis ${{ github.sha }}" \
            --prerelease
