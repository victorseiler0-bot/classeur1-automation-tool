name: Build macOS App

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-14
            arch: apple-silicon
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install pyinstaller pillow

      - name: Build app
        run: |
          pyinstaller --onefile --windowed \
            --icon=icon.icns \
            --add-data "custom_track.mp3:." \
            --name Classeur1 \
            automation_tool.py

      - name: "Verif - temporaire"
        run: |
          echo "--- Nombre de fichiers dans le bundle (onefile) ---"
          find dist/Classeur1.app -type f | wc -l
          echo "--- Test fonctionnel (sans quarantine) ---"
          open dist/Classeur1.app
          sleep 8
          screencapture -x /tmp/verif.png || echo "screencapture echoue"
          ps aux | grep -i classeur1 | grep -v grep || echo "AUCUN PROCESSUS"
          cat "$HOME/Library/Application Support/Classeur1/automation_tool.log" 2>&1 || echo "pas de log"
          pkill -f Classeur1 || true
          echo "--- xattr -rd cible sur le bundle apres quarantine simulee ---"
          xattr -w com.apple.quarantine "0081;00000000;Safari;" dist/Classeur1.app
          xattr -rd com.apple.quarantine dist/Classeur1.app
          xattr -pl com.apple.quarantine dist/Classeur1.app 2>&1 || echo "quarantine bien supprimee (plus d'attribut)"
        continue-on-error: true
        timeout-minutes: 3

      - name: "Upload verif screenshot - temporaire"
        uses: actions/upload-artifact@v4
        with:
          name: verif-screenshot
          path: /tmp/verif.png
          if-no-files-found: warn

      - name: Package as .dmg
        run: hdiutil create -volname "Classeur1" -srcfolder dist/Classeur1.app -ov -format UDZO "Classeur1-${{ matrix.arch }}.dmg"

      - name: Upload dmg artifact
        uses: actions/upload-artifact@v4
        with:
          name: dmg-${{ matrix.arch }}
          path: Classeur1-${{ matrix.arch }}.dmg

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          pattern: dmg-*
          merge-multiple: true

      - name: "Publish as GitHub Release (Apple Silicon)"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ls -la
          git tag -f latest
          git push -f origin latest
          gh release delete latest --yes || true
          gh release create latest Classeur1-apple-silicon.dmg \
            --title "Classeur1 (dernier build)" \
            --notes "Build automatique depuis ${{ github.sha }}. Version Apple Silicon (M1/M2/M3/M4...) uniquement pour l'instant, mode --onefile." \
            --prerelease
